<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI YouTube Pose Tracker (Multi-Proxy)</title>
    <style>
        /* [LOG: 20260327_1246] Multi-Proxy Failover UI */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 22px;
            color: #ef4444;
        }

        .video-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        #mainVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #poseCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .panel {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #fff;
            outline: none;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-main {
            background: #ef4444;
            color: white;
            width: 100%;
            font-size: 16px;
        }

        .btn-main:disabled {
            background: #475569;
            opacity: 0.6;
        }

        #status {
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
            background: #0f172a;
            border: 1px solid #1d4ed833;
        }

        #log {
            font-family: monospace;
            font-size: 11px;
            color: #94a3b8;
            height: 100px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            white-space: pre-wrap;
            margin-top: 10px;
            border: 1px solid #222;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🏋️ AI YouTube Pose Tracker</h1>
            <p style="font-size:12px; color:#64748b;">다중 우회 경로를 이용한 모바일/PC 통합 분석기</p>
        </header>

        <div class="video-box">
            <video id="mainVideo" crossorigin="anonymous" playsinline controls></video>
            <canvas id="poseCanvas"></canvas>
        </div>

        <div class="panel">
            <div id="status">🤖 인공지능 모듈 준비 중...</div>
            <div class="input-row">
                <input type="text" id="videoIdInput" placeholder="유튜브 ID 입력 (11자리)" value="8a9M0lNY37s">
            </div>
            <button id="btnStart" class="btn-main" onclick="startAnalysis()" disabled>🚀 분석 시작</button>
        </div>

        <div id="log"></div>
    </div>

    <script type="module">
        // [LOG: 20260327_1246] Client-Side Multi-Proxy Hopping Engine

        // 1. 시도해볼 우회 서버 목록 (Invidious 인스턴스들)
        const PROXY_LIST = [
            "/api/video-stream/", // 우리 Vercel 서버 (Cobalt 시도)
            "https://inv.tux.rs/latest_version?id=",
            "https://invidious.snopyta.org/latest_version?id=",
            "https://invidious.namazso.eu/latest_version?id=",
            "https://invidious.tiekoetter.com/latest_version?id=",
            "https://vid.plus.ee/latest_version?id="
        ];

        let poseLandmarker = null;
        let poseConnections = null;
        let animFrameId = null;

        const mainVideo = document.getElementById("mainVideo");
        const poseCanvas = document.getElementById("poseCanvas");
        const statusEl = document.getElementById("status");
        const btnStart = document.getElementById("btnStart");
        const ctx = poseCanvas.getContext("2d");

        function log(msg) {
            console.log(msg);
            const logEl = document.getElementById("log");
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML = `[${time}] ${msg}\n` + logEl.innerHTML;
        }

        // 전역 노출
        window.startAnalysis = async function () {
            const id = document.getElementById("videoIdInput").value.trim();
            if (id.length !== 11) return alert("올바른 유튜브 ID를 입력하세요.");

            btnStart.disabled = true;
            statusEl.textContent = "⏳ 경로 우회 중... (최대 5개 서버 시도)";
            log(`⚡ 분석 시작 요청: ${id}`);

            // 다중 경로 시도 루프 시작
            tryProxy(id, 0);
        };

        async function tryProxy(videoId, index) {
            if (index >= PROXY_LIST.length) {
                log("❌ 모든 우회 경로가 차단되었습니다. 잠시 후 다시 시도해 주세요.");
                statusEl.textContent = "❌ 모든 서버 응답 없음";
                statusEl.style.color = "#f87171";
                btnStart.disabled = false;
                return;
            }

            const proxyBase = PROXY_LIST[index];
            const testUrl = proxyBase.startsWith("/") ? `${proxyBase}${videoId}` : `${proxyBase}${videoId}&itag=18`;

            log(`🔄 경로 #${index + 1} 시도 중: ${proxyBase.split('/')[2] || 'Vercel API'}`);

            // 타임아웃 처리 (한 서버당 최대 5초)
            const timeoutId = setTimeout(() => {
                log(`⚠️ 경로 #${index + 1} 응답 지연 → 다음 경로로 점프`);
                mainVideo.onloadeddata = null;
                mainVideo.onerror = null;
                tryProxy(videoId, index + 1);
            }, 5000);

            mainVideo.src = testUrl;
            mainVideo.load();

            mainVideo.onloadeddata = () => {
                clearTimeout(timeoutId);
                log(`✅ 경로 #${index + 1} 연결 성공!`);
                statusEl.textContent = "🦴 실시간 포즈 감지 작동 중";
                statusEl.style.color = "#4ade80";
                btnStart.disabled = false;

                poseCanvas.width = mainVideo.videoWidth;
                poseCanvas.height = mainVideo.videoHeight;

                if (animFrameId) cancelAnimationFrame(animFrameId);
                startLoop();
            };

            mainVideo.onerror = () => {
                clearTimeout(timeoutId);
                log(`🚫 경로 #${index + 1} 실패 (CORS 또는 503)`);
                tryProxy(videoId, index + 1);
            };
        }

        function startLoop() {
            function loop() {
                if (mainVideo.readyState >= 2 && !mainVideo.paused && poseLandmarker) {
                    try {
                        const result = poseLandmarker.detectForVideo(mainVideo, performance.now());
                        ctx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);
                        if (result.landmarks && result.landmarks[0]) drawPose(result.landmarks[0]);
                    } catch (e) {
                        // CORS Tainted Canvas 에러 발생 시 로그
                        if (e.message.includes("tainted")) {
                            log("❌ 픽셀 보안 오류(CORS) 발생. 다른 경로를 찾습니다.");
                            cancelAnimationFrame(animFrameId);
                        }
                    }
                }
                animFrameId = requestAnimationFrame(loop);
            }
            animFrameId = requestAnimationFrame(loop);
        }

        async function initAI() {
            try {
                const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0");
                const resolver = await vision.FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                poseLandmarker = await vision.PoseLandmarker.createFromOptions(resolver, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task", delegate: "GPU" },
                    runningMode: "VIDEO", numPoses: 1
                });
                poseConnections = vision.PoseLandmarker.POSE_CONNECTIONS;
                statusEl.textContent = "✅ 준비 완료! 버튼을 눌러주세요.";
                btnStart.disabled = false;
                log("인공지능 로딩 완료");
            } catch (e) {
                statusEl.textContent = "❌ AI 모듈 로드 실패";
                log(`에러: ${e.message}`);
            }
        }

        function drawPose(landmarks) {
            ctx.save();
            ctx.strokeStyle = "#4ade80";
            ctx.lineWidth = 4;
            poseConnections.forEach(c => {
                const s = landmarks[c.start], e = landmarks[c.end];
                if (s.visibility > 0.6 && e.visibility > 0.6) {
                    ctx.beginPath();
                    ctx.moveTo(s.x * poseCanvas.width, s.y * poseCanvas.height);
                    ctx.lineTo(e.x * poseCanvas.width, e.y * poseCanvas.height);
                    ctx.stroke();
                }
            });
            landmarks.forEach((p, idx) => {
                if (p.visibility > 0.6) {
                    ctx.beginPath();
                    ctx.arc(p.x * poseCanvas.width, p.y * poseCanvas.height, 5, 0, 2 * Math.PI);
                    ctx.fillStyle = idx % 2 === 0 ? "#ef4444" : "#fff";
                    ctx.fill();
                }
            });
            ctx.restore();
        }

        initAI();
    </script>
</body>

</html>
