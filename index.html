<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pose Tracker Pro (Local File)</title>
    <style>
        /* [LOG: 20260327_1302] Final Clean Reliable UI */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            color: #ef4444;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 5px;
        }

        /* 비디오 분석 창 */
        .preview-window {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #020617;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }

        #mainVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #poseCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* 컨트롤 패널 */
        .controls {
            background: #1e293b;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #475569;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 파일 선택 스타일링 */
        .file-upload {
            border: 2px dashed #475569;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }

        .file-upload:hover {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        input[type="file"] {
            display: none;
        }

        .upload-label {
            font-weight: 600;
            color: #e2e8f0;
            display: block;
            cursor: pointer;
        }

        .upload-hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 5px;
        }

        #status {
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            background: #0f172a;
            border: 1px solid #1e40af;
            color: #60a5fa;
        }

        /* 로딩 애니메이션 */
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🏋️ AI Pose Tracker Pro</h1>
            <p>유튜브 차단 걱정 없는 100% 확실한 로컬 영상 분석</p>
        </header>

        <div class="preview-window">
            <video id="mainVideo" playsinline controls></video>
            <canvas id="poseCanvas"></canvas>
            <!-- [LOG: 20260327_1328] DOM 기반 상태 표시기 추가 (캔버스 신뢰성 문제 해결) -->
            <div id="aiOverlay"
                style="position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 5px; font-size: 12px; color: #4ade80; pointer-events: none; border: 1px solid #4ade80; display: none;">
                AI 탐색 중...
            </div>
        </div>

        <div class="controls">
            <div id="status">⏳ 모듈 초기화 중...</div>

            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <label class="file-upload" id="dropZone" style="flex: 2; min-width: 200px;">
                    <input type="file" id="videoInput" accept="video/*">
                    <span class="upload-label">📁 영상 파일 선택</span>
                </label>
                <div style="flex: 1; display: flex; flex-direction: column; gap: 5px;">
                    <button onclick="window.toggleHardware()"
                        style="width: 100%; background: #334155; color: #e2e8f0; font-size: 12px; padding: 10px; border-radius: 8px; border: 1px solid #475569; cursor: pointer;">
                        ⚙️ 가속 모드 변경
                    </button>
                    <button onclick="window.testCanvas()"
                        style="width: 100%; background: #1e293b; color: #94a3b8; font-size: 11px; padding: 5px; border-radius: 8px; border: 1px solid #334155; cursor: pointer;">
                        🛠️ 화면 테스트
                    </button>
                </div>
            </div>

            <p style="font-size: 11px; color: #64748b; text-align: center;">
                💡 팁: 영상 재생 버튼을 눌러야 분석이 시작됩니다. (너무 느리면 가속 모드 변경)
            </p>
        </div>
    </div>

    <script type="module">
        // [LOG: 20260327_1302] Final Reliable Local Analysis Engine
        let poseLandmarker = null;
        let poseConnections = null;
        let animFrameId = null;

        const mainVideo = document.getElementById("mainVideo");
        const poseCanvas = document.getElementById("poseCanvas");
        const videoInput = document.getElementById("videoInput");
        const statusEl = document.getElementById("status");
        const aiOverlay = document.getElementById("aiOverlay");
        const ctx = poseCanvas.getContext("2d");

        // [LOG: 20260327_1328] 시스템 테스트 기능 (캔버스 정상 출력 확인용)
        window.testCanvas = () => {
            console.log("Canvas testing...");
            ctx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);
            ctx.strokeStyle = "#ff0000";
            ctx.lineWidth = 10;
            ctx.strokeRect(20, 20, poseCanvas.width - 40, poseCanvas.height - 40);
            ctx.fillStyle = "#ff0000";
            ctx.font = "bold 30px sans-serif";
            ctx.fillText("CANVAS TEST: OK", 50, 80);
            alert("화면에 빨간색 사각형과 글씨가 보이시나요? 안 보인다면 브라우저 설정 문제입니다.");
        };

        // 1. 파일 선택 처리
        videoInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            mainVideo.src = url;
            mainVideo.load();

            statusEl.innerHTML = '<span class="spinner"></span> 영상 로딩 중...';

            mainVideo.onloadeddata = () => {
                statusEl.textContent = "🦴 영상 로드 완료. 재생을 눌러주세요.";
                statusEl.style.borderColor = "#059669";
                statusEl.style.color = "#34d399";

                poseCanvas.width = mainVideo.videoWidth;
                poseCanvas.height = mainVideo.videoHeight;

                if (animFrameId) cancelAnimationFrame(animFrameId);
                startLoop();

                mainVideo.play().catch(e => console.warn("Auto-play blocked:", e));
            };
        });

        // 2. 인공지능 초기화
        async function initAI(delegateType = "GPU") {
            try {
                if (poseLandmarker) {
                    await poseLandmarker.close();
                    poseLandmarker = null;
                }

                statusEl.innerHTML = `<span class="spinner"></span> AI 모듈(${delegateType}) 설정 중...`;

                const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0");
                const resolver = await vision.FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");

                // [LOG: 20260327_1334] 성능을 위해 Lite 모델로 복구 (1초 지연 해결)
                poseLandmarker = await vision.PoseLandmarker.createFromOptions(resolver, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
                        delegate: delegateType
                    },
                    runningMode: "VIDEO", numPoses: 1
                });
                poseConnections = vision.PoseLandmarker.POSE_CONNECTIONS;

                statusEl.textContent = `✅ AI (${delegateType}) 준비 완료!`;
                console.log(`MediaPipe Full initialized with ${delegateType}`);
            } catch (e) {
                statusEl.textContent = `❌ AI 로드 실패 (${delegateType})`;
                console.error(e);
            }
        }

        // 전역 함수 등록
        window.toggleHardware = async function () {
            const current = statusEl.textContent.includes("GPU") ? "CPU" : "GPU";
            await initAI(current);
        };

        // 3. 실시간 분석 루프
        let lastTime = -1;
        function startLoop() {
            function loop() {
                if (mainVideo.readyState >= 2 && !mainVideo.paused && poseLandmarker) {
                    try {
                        const now = performance.now();
                        if (now - lastTime < 40) { // 25fps로 더 낮춤 (안정성)
                            animFrameId = requestAnimationFrame(loop);
                            return;
                        }
                        lastTime = now;

                        const result = poseLandmarker.detectForVideo(mainVideo, now);
                        ctx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);

                        if (result.landmarks && result.landmarks.length > 0) {
                            drawPose(result.landmarks[0]);
                            aiOverlay.style.display = "none";
                        } else {
                            aiOverlay.textContent = "🔍 인물 찾는 중...";
                            aiOverlay.style.display = "block";
                        }
                    } catch (err) {
                        console.error("Detection error:", err);
                    }
                }
                animFrameId = requestAnimationFrame(loop);
            }
            animFrameId = requestAnimationFrame(loop);
        }

        function drawPose(landmarks) {
            ctx.save();
            ctx.strokeStyle = "#4ade80";
            ctx.lineWidth = 3;

            // 1. 선 그리기 (필터 제거: 무조건 그림)
            poseConnections.forEach(c => {
                const s = landmarks[c.start], e = landmarks[c.end];
                ctx.beginPath();
                ctx.moveTo(s.x * poseCanvas.width, s.y * poseCanvas.height);
                ctx.lineTo(e.x * poseCanvas.width, e.y * poseCanvas.height);
                ctx.stroke();
            });

            // 2. 점 그리기
            landmarks.forEach((p, idx) => {
                ctx.beginPath();
                ctx.arc(p.x * poseCanvas.width, p.y * poseCanvas.height, 4, 0, 2 * Math.PI);
                ctx.fillStyle = (p.visibility > 0.5) ? "#ef4444" : "#3b82f6"; // 신뢰도 낮으면 파란색
                ctx.fill();
            });

            // 3. 상태 표시 및 디버그
            const avgVis = landmarks.reduce((sum, p) => sum + p.visibility, 0) / 33;
            ctx.fillStyle = "#4ade80";
            ctx.font = "bold 14px sans-serif";
            ctx.fillText(`✅ 분석 중 (평균 신뢰도: ${avgVis.toFixed(2)})`, 10, 25);
            ctx.restore();
        }

        initAI();
    </script>
</body>

</html>
