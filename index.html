<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Pose Detection Test</title>
    <style>
        /* [LOG: 20260327_1121] 기본 스타일 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 20px;
        }

        /* 비디오 컨테이너 */
        .video-container {
            position: relative;
            width: 640px;
            height: 360px;
            background: #000;
            margin-bottom: 20px;
        }

        /* YouTube IFrame 플레이어 */
        #player {
            width: 100%;
            height: 100%;
        }

        /* 로컬 파일 비디오 (MediaPipe용) */
        #localVideo {
            width: 100%;
            height: 100%;
            display: none;
            background: #000;
        }

        /* 프록시 비디오 (숨김, 로컬서버용) */
        #proxyVideo {
            display: none;
        }

        /* 포즈 오버레이 캔버스 */
        #poseCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 상태 표시 */
        #status {
            margin-bottom: 10px;
            padding: 10px 20px;
            background: #222;
            border-radius: 8px;
            font-size: 14px;
            min-width: 300px;
            text-align: center;
        }

        .status-ok {
            color: #4ade80;
        }

        .status-loading {
            color: #facc15;
        }

        .status-error {
            color: #f87171;
        }

        /* 컨트롤 */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 8px 16px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #444;
        }

        button.active {
            background: #2563eb;
            border-color: #3b82f6;
        }

        /* 모드 탭 */
        .mode-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #444;
        }

        .mode-tab {
            padding: 10px 24px;
            background: #222;
            color: #aaa;
            cursor: pointer;
            font-size: 14px;
            border: none;
            border-radius: 0;
        }

        .mode-tab.active {
            background: #2563eb;
            color: #fff;
        }

        /* 패널 */
        .panel {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            width: 640px;
        }

        .panel label {
            font-size: 14px;
            margin-right: 10px;
        }

        input[type="text"] {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            width: 120px;
        }

        input[type="file"] {
            display: none;
        }

        .file-btn {
            padding: 10px 20px;
            background: #16a34a;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .file-btn:hover {
            background: #15803d;
        }

        #fileInfo {
            margin-top: 8px;
            font-size: 13px;
            color: #aaa;
        }

        /* 로그 */
        #log {
            width: 640px;
            height: 150px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <h1>🏋️ YouTube Pose Detection Test</h1>

    <!-- 상태 표시 -->
    <div id="status" class="status-loading">⏳ 초기화 중...</div>

    <!-- 모드 선택 탭 -->
    <div class="mode-tabs">
        <button class="mode-tab active" id="tabYoutube" onclick="switchMode('youtube')">📺 YouTube 재생</button>
        <button class="mode-tab" id="tabFile" onclick="switchMode('file')">📁 내 영상 파일 (포즈감지)</button>
    </div>

    <!-- YouTube 모드 패널 -->
    <div class="panel" id="panelYoutube">
        <label>YouTube Video ID:</label>
        <input type="text" id="videoIdInput" value="8a9M0lNY37s">
        <button onclick="handleLoadVideo()" style="background: #2563eb; color: white;">영상 로드</button>
        <div style="margin-top:8px; font-size:12px; color:#888;">
            ※ YouTube 영상은 플레이어에서 재생됩니다. 포즈 감지는 아래 "내 영상 파일" 탭을 사용하세요.
        </div>
    </div>

    <!-- 파일 모드 패널 -->
    <div class="panel" id="panelFile" style="display:none;">
        <label>영상 파일 선택 (mp4, webm 등):</label><br><br>
        <button class="file-btn" onclick="document.getElementById('fileInput').click()">📂 파일 선택</button>
        <input type="file" id="fileInput" accept="video/*" onchange="handleFileSelect(event)">
        <div id="fileInfo">파일을 선택하면 자동으로 포즈 감지가 시작됩니다.</div>
    </div>

    <!-- 비디오 + 포즈 캔버스 -->
    <div class="video-container">
        <!-- YouTube IFrame 플레이어 -->
        <div id="player"></div>
        <!-- 로컬 파일 비디오 (파일 모드) -->
        <video id="localVideo" controls playsinline></video>
        <!-- 숨김: 프록시 비디오 (로컬서버용) -->
        <video id="proxyVideo" crossorigin="anonymous" playsinline></video>
        <canvas id="poseCanvas"></canvas>
    </div>

    <!-- 컨트롤 버튼 -->
    <div class="controls">
        <button id="btnTogglePose" onclick="handleTogglePose()" class="active">🦴 포즈감지: ON</button>
    </div>

    <!-- 로그 -->
    <div id="log"></div>

    <script type="module">
        // [LOG: 20260327_1121] YouTube Pose Detection - Dual Mode (YouTube + File Upload)

        // ===== 설정 =====
        var VIDEO_ID = "8a9M0lNY37s";
        var currentMode = "youtube"; // "youtube" | "file"

        // ===== DOM 요소 =====
        var proxyVideo = document.getElementById("proxyVideo");
        var localVideo = document.getElementById("localVideo");
        var poseCanvas = document.getElementById("poseCanvas");
        var statusEl = document.getElementById("status");
        var logEl = document.getElementById("log");
        var btnTogglePose = document.getElementById("btnTogglePose");

        // ===== 상태 변수 =====
        var ytPlayer = null;
        var poseLandmarker = null;
        var poseConnections = null;
        var canvasCtx = poseCanvas.getContext("2d");
        var poseEnabled = true;
        var animFrameId = null;

        // ===== 현재 분석 대상 비디오 =====
        function getActiveVideo() {
            if (currentMode === "file") return localVideo;
            return proxyVideo;
        }

        // ===== 로그 함수 =====
        function log(msg) {
            var time = new Date().toLocaleTimeString();
            var line = "[" + time + "] " + msg;
            console.log(line);
            logEl.textContent = line + "\n" + logEl.textContent;
        }

        // ===== 상태 업데이트 =====
        function setStatus(text, type) {
            statusEl.textContent = text;
            statusEl.className = "status-" + type;
        }

        // ===== 모드 전환 =====
        window.switchMode = function (mode) {
            currentMode = mode;

            // 탭 스타일 업데이트
            document.getElementById("tabYoutube").classList.toggle("active", mode === "youtube");
            document.getElementById("tabFile").classList.toggle("active", mode === "file");

            // 패널 표시
            document.getElementById("panelYoutube").style.display = mode === "youtube" ? "block" : "none";
            document.getElementById("panelFile").style.display = mode === "file" ? "block" : "none";

            // 비디오 컨테이너 업데이트
            if (mode === "youtube") {
                document.getElementById("player").style.display = "block";
                localVideo.style.display = "none";
                localVideo.pause();
            } else {
                document.getElementById("player").style.display = "none";
                localVideo.style.display = "block";
            }

            // 포즈 루프 중지
            if (animFrameId) {
                cancelAnimationFrame(animFrameId);
                animFrameId = null;
            }
            canvasCtx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);

            log("모드 전환: " + mode);
        };

        // ===== 파일 선택 핸들러 =====
        window.handleFileSelect = function (event) {
            var file = event.target.files[0];
            if (!file) return;

            document.getElementById("fileInfo").textContent = "선택된 파일: " + file.name;
            log("📁 파일 선택: " + file.name);

            var url = URL.createObjectURL(file);
            localVideo.src = url;

            localVideo.onloadeddata = function () {
                log("✅ 영상 로드 완료 (" + localVideo.videoWidth + "x" + localVideo.videoHeight + ")");
                poseCanvas.width = localVideo.videoWidth || 640;
                poseCanvas.height = localVideo.videoHeight || 360;
                setStatus("✅ 파일 로드 완료! 재생하면 포즈 감지가 시작됩니다.", "ok");
            };

            localVideo.onplay = function () {
                log("▶️ 재생 시작 → 포즈 감지 루프 시작");
                if (poseEnabled && !animFrameId) {
                    startPoseLoop();
                }
            };

            localVideo.onpause = function () {
                if (animFrameId) {
                    cancelAnimationFrame(animFrameId);
                    animFrameId = null;
                }
            };

            localVideo.load();
        };

        // ===== YouTube IFrame API 로드 =====
        function loadYouTubeAPI() {
            return new Promise(function (resolve, reject) {
                if (window.YT && window.YT.Player) {
                    resolve();
                    return;
                }

                window.onYouTubeIframeAPIReady = function () {
                    log("✅ YouTube IFrame API 준비 완료");
                    resolve();
                };

                var tag = document.createElement("script");
                tag.src = "https://www.youtube.com/iframe_api";
                tag.onerror = function () {
                    reject(new Error("YouTube IFrame API 스크립트 로드 실패"));
                };
                var firstScript = document.getElementsByTagName("script")[0];
                firstScript.parentNode.insertBefore(tag, firstScript);
            });
        }

        // ===== YouTube IFrame 플레이어 생성 =====
        function createYouTubePlayer(videoId) {
            return new Promise(function (resolve) {
                ytPlayer = new YT.Player("player", {
                    height: "100%",
                    width: "100%",
                    videoId: videoId,
                    playerVars: {
                        autoplay: 0,
                        playsinline: 1,
                        controls: 1,
                        rel: 0,
                        enablejsapi: 1
                    },
                    events: {
                        onReady: function () {
                            log("✅ YouTube 플레이어 준비 완료");
                            resolve();
                        },
                        onError: function (e) {
                            log("❌ 플레이어 에러: " + e.data);
                        }
                    }
                });
            });
        }

        // ===== 영상 로드 버튼 핸들러 =====
        window.handleLoadVideo = function () {
            var id = document.getElementById("videoIdInput").value.trim();
            if (id.length !== 11) {
                alert("YouTube Video ID는 11자리여야 합니다.");
                return;
            }
            VIDEO_ID = id;

            if (ytPlayer && ytPlayer.loadVideoById) {
                ytPlayer.loadVideoById(VIDEO_ID);
                log("📺 IFrame 영상 변경: " + VIDEO_ID);
            }
        };

        // ===== 프록시 비디오 로드 (로컬서버용) =====
        function loadProxyVideo(videoId) {
            var url = "/api/video-stream/" + videoId;
            log("프록시 요청: " + url);
            proxyVideo.src = url;

            proxyVideo.onloadeddata = function () {
                log("✅ 프록시 영상 로드 완료 (" + proxyVideo.videoWidth + "x" + proxyVideo.videoHeight + ")");
                poseCanvas.width = proxyVideo.videoWidth;
                poseCanvas.height = proxyVideo.videoHeight;
            };

            proxyVideo.onerror = function () {
                log("⚠️ 프록시 영상 로드 실패 (Vercel 환경에서는 정상. 파일 탭을 사용하세요.)");
            };

            proxyVideo.load();
        }

        // ===== 포즈 감지 토글 =====
        window.handleTogglePose = function () {
            poseEnabled = !poseEnabled;

            if (poseEnabled) {
                btnTogglePose.textContent = "🦴 포즈감지: ON";
                btnTogglePose.classList.add("active");
                log("🦴 포즈 감지 켜짐");

                var active = getActiveVideo();
                if (!active.paused && !animFrameId) {
                    startPoseLoop();
                }
            } else {
                btnTogglePose.textContent = "🦴 포즈감지: OFF";
                btnTogglePose.classList.remove("active");
                log("🦴 포즈 감지 꺼짐");
                canvasCtx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);
            }
        };

        // ===== MediaPipe 초기화 =====
        async function initMediaPipe() {
            log("MediaPipe 로딩 중...");

            try {
                var visionModule = await import(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"
                );

                var PoseLandmarker = visionModule.PoseLandmarker;
                var FilesetResolver = visionModule.FilesetResolver;
                poseConnections = PoseLandmarker.POSE_CONNECTIONS;

                var vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
                );

                poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numPoses: 1
                });

                log("✅ MediaPipe PoseLandmarker 준비 완료!");
                return true;
            } catch (e) {
                log("❌ MediaPipe 초기화 실패: " + e.message);
                return false;
            }
        }

        // ===== 포즈 감지 루프 =====
        function startPoseLoop() {
            if (animFrameId) return;

            log("포즈 감지 루프 시작");
            var detectCount = 0;

            function loop() {
                if (!poseEnabled) {
                    animFrameId = null;
                    return;
                }

                var active = getActiveVideo();
                var ready = active.readyState >= 2;
                var playing = !active.paused;

                if (ready && playing && poseLandmarker) {
                    var timeMs = performance.now();

                    try {
                        var result = poseLandmarker.detectForVideo(active, timeMs);

                        detectCount++;
                        if (detectCount === 1) {
                            log("✅ detectForVideo 첫 호출 성공!");
                        }

                        if (poseCanvas.width !== active.videoWidth || poseCanvas.height !== active.videoHeight) {
                            poseCanvas.width = active.videoWidth || 640;
                            poseCanvas.height = active.videoHeight || 360;
                        }

                        canvasCtx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);

                        if (result && result.landmarks && result.landmarks.length > 0) {
                            drawPose(result.landmarks[0]);
                        }
                    } catch (e) {
                        if (detectCount === 0) {
                            log("❌ detectForVideo 에러: " + e.message);
                        }
                    }
                }

                animFrameId = requestAnimationFrame(loop);
            }

            animFrameId = requestAnimationFrame(loop);
        }

        // ===== 포즈 그리기 =====
        function drawPose(landmarks) {
            if (poseConnections) {
                canvasCtx.save();
                canvasCtx.strokeStyle = "rgba(255, 255, 255, 0.6)";
                canvasCtx.lineWidth = 3;
                canvasCtx.lineCap = "round";

                for (var i = 0; i < poseConnections.length; i++) {
                    var conn = poseConnections[i];
                    var startPt = landmarks[conn.start];
                    var endPt = landmarks[conn.end];

                    if (!startPt || startPt.visibility < 0.5 || !endPt || endPt.visibility < 0.5) continue;

                    canvasCtx.beginPath();
                    canvasCtx.moveTo(startPt.x * poseCanvas.width, startPt.y * poseCanvas.height);
                    canvasCtx.lineTo(endPt.x * poseCanvas.width, endPt.y * poseCanvas.height);
                    canvasCtx.stroke();
                }
                canvasCtx.restore();
            }

            canvasCtx.save();
            for (var j = 0; j < landmarks.length; j++) {
                var pt = landmarks[j];
                if (pt.visibility < 0.5) continue;

                var cx = pt.x * poseCanvas.width;
                var cy = pt.y * poseCanvas.height;

                canvasCtx.beginPath();
                canvasCtx.arc(cx, cy, 4, 0, 2 * Math.PI);
                canvasCtx.fillStyle = "#FF0000";
                canvasCtx.fill();

                canvasCtx.beginPath();
                canvasCtx.arc(cx, cy, 2, 0, 2 * Math.PI);
                canvasCtx.fillStyle = "#FFFFFF";
                canvasCtx.fill();
            }
            canvasCtx.restore();
        }

        // ===== 초기화 =====
        async function main() {
            log("=== YouTube Pose Detection Test (Dual Mode) ===");

            var initialId = document.getElementById("videoIdInput").value.trim();
            if (initialId) VIDEO_ID = initialId;
            log("Initial Video ID: " + VIDEO_ID);

            // 1. YouTube IFrame API 로드
            try {
                setStatus("⏳ YouTube API 로딩 중...", "loading");
                await loadYouTubeAPI();
            } catch (e) {
                log("❌ YouTube API 로드 실패: " + e.message);
                setStatus("❌ YouTube API 로드 실패", "error");
                return;
            }

            // 2. YouTube IFrame 플레이어 생성
            await createYouTubePlayer(VIDEO_ID);

            // 3. 프록시 비디오 로드 (로컬서버 환경에서만 작동)
            loadProxyVideo(VIDEO_ID);

            // 4. MediaPipe 초기화
            var mpOk = await initMediaPipe();
            if (!mpOk) {
                setStatus("⚠️ MediaPipe 실패. 영상만 재생 가능.", "error");
            } else {
                setStatus("✅ 준비 완료! 📺 YouTube 탭: 영상 시청 | 📁 파일 탭: 포즈 감지", "ok");
            }
        }

        main();
    </script>
</body>

</html>
