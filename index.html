<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI YouTube Pose Tracker</title>
    <style>
        /* [LOG: 20260327_1235] Ultimate Simple UI */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 24px;
            color: #ef4444;
            margin-bottom: 5px;
        }

        p {
            font-size: 13px;
            color: #94a3b8;
        }

        /* 비디오 섹션 (핵심) */
        .video-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        #mainVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #poseCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* 컨트롤 패널 */
        .panel {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #fff;
            outline: none;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-main {
            background: #ef4444;
            color: white;
            width: 100%;
            font-size: 16px;
        }

        .btn-main:hover {
            background: #dc2626;
            transform: translateY(-1px);
        }

        .btn-main:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        #status {
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
            background: #0f172a;
            color: #60a5fa;
            border: 1px solid #1d4ed833;
        }

        #log {
            font-family: monospace;
            font-size: 11px;
            color: #94a3b8;
            height: 80px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🏋️ AI YouTube Pose Tracker</h1>
            <p>유튜브 ID만 입력하면 즉시 분석이 시작됩니다. (PC/모바일 공용)</p>
        </header>

        <div class="video-box">
            <video id="mainVideo" crossorigin="anonymous" playsinline controls></video>
            <canvas id="poseCanvas"></canvas>
        </div>

        <div class="panel">
            <div id="status">🤖 인공지능 모듈 준비 중...</div>

            <div class="input-row">
                <input type="text" id="videoIdInput" placeholder="유튜브 ID 입력 (예: 8a9M0lNY37s)" value="8a9M0lNY37s">
            </div>

            <button id="btnStart" class="btn-main" onclick="startAnalysis()" disabled>
                🚀 분석 시작
            </button>
        </div>

        <div id="log"></div>
    </div>

    <script type="module">
        // [LOG: 20260327_1235] Ultimate Zero-Config Client Engine
        let poseLandmarker = null;
        let poseConnections = null;
        let animFrameId = null;

        const mainVideo = document.getElementById("mainVideo");
        const poseCanvas = document.getElementById("poseCanvas");
        const statusEl = document.getElementById("status");
        const btnStart = document.getElementById("btnStart");
        const ctx = poseCanvas.getContext("2d");

        function log(msg) {
            console.log(msg);
            const logEl = document.getElementById("log");
            logEl.style.display = "block";
            logEl.innerHTML = `> ${msg}<br>` + logEl.innerHTML;
        }

        window.startAnalysis = async function startAnalysis() {
            const id = document.getElementById("videoIdInput").value.trim();
            if (id.length !== 11) return alert("올바른 유튜브 ID를 입력하세요.");

            statusEl.textContent = "⏳ 우회 서버에서 영상을 가져오는 중...";
            btnStart.disabled = true;
            log(`유튜브 우회 요청: ${id}`);

            try {
                // Vercel API 호출 (Cobalt API 프록시)
                mainVideo.src = `/api/video-stream/${id}`;
                mainVideo.load();

                mainVideo.onloadeddata = () => {
                    log("✅ 영상 로드 성공! 분석을 시작합니다.");
                    statusEl.textContent = "🦴 포즈 감지 실시간 작동 중";
                    statusEl.style.color = "#4ade80";
                    btnStart.disabled = false;

                    poseCanvas.width = mainVideo.videoWidth;
                    poseCanvas.height = mainVideo.videoHeight;

                    if (animFrameId) cancelAnimationFrame(animFrameId);
                    startLoop();
                };

                mainVideo.onerror = () => {
                    throw new Error("영상 스트림을 가져오지 못했습니다. 잠시 후 다시 시도하세요.");
                };

            } catch (e) {
                log(`❌ 오류: ${e.message}`);
                statusEl.textContent = "❌ 오류 발생 (잠시 후 다시 시도)";
                statusEl.style.color = "#f87171";
                btnStart.disabled = false;
            }
        };

        async function initAI() {
            try {
                const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0");
                const resolver = await vision.FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                poseLandmarker = await vision.PoseLandmarker.createFromOptions(resolver, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO", numPoses: 1
                });
                poseConnections = vision.PoseLandmarker.POSE_CONNECTIONS;

                statusEl.textContent = "✅ 준비 완료! 버튼을 눌러주세요.";
                btnStart.disabled = false;
                log("MediaPipe 로딩 완료");
            } catch (e) {
                statusEl.textContent = "❌ AI 모듈 로드 실패";
                log(`AI 로드 에러: ${e.message}`);
            }
        }

        function startLoop() {
            function loop() {
                if (mainVideo.readyState >= 2 && !mainVideo.paused && poseLandmarker) {
                    const result = poseLandmarker.detectForVideo(mainVideo, performance.now());
                    ctx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);
                    if (result.landmarks && result.landmarks[0]) drawPose(result.landmarks[0]);
                }
                animFrameId = requestAnimationFrame(loop);
            }
            animFrameId = requestAnimationFrame(loop);
        }

        function drawPose(landmarks) {
            ctx.save();
            ctx.strokeStyle = "#4ade80";
            ctx.lineWidth = 4;
            poseConnections.forEach(c => {
                const s = landmarks[c.start], e = landmarks[c.end];
                if (s.visibility > 0.6 && e.visibility > 0.6) {
                    ctx.beginPath();
                    ctx.moveTo(s.x * poseCanvas.width, s.y * poseCanvas.height);
                    ctx.lineTo(e.x * poseCanvas.width, e.y * poseCanvas.height);
                    ctx.stroke();
                }
            });
            landmarks.forEach((p, idx) => {
                if (p.visibility > 0.6) {
                    ctx.beginPath();
                    ctx.arc(p.x * poseCanvas.width, p.y * poseCanvas.height, 5, 0, 2 * Math.PI);
                    ctx.fillStyle = idx % 2 === 0 ? "#ef4444" : "#fff";
                    ctx.fill();
                }
            });
            ctx.restore();
        }

        initAI();
    </script>
</body>

</html>
