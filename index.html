<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pose Tracker Pro (Local File)</title>
    <style>
        /* [LOG: 20260327_1302] Final Clean Reliable UI */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            color: #ef4444;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 5px;
        }

        /* 비디오 분석 창 */
        .preview-window {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #020617;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }

        #mainVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #poseCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* 컨트롤 패널 */
        .controls {
            background: #1e293b;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #475569;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 파일 선택 스타일링 */
        .file-upload {
            border: 2px dashed #475569;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }

        .file-upload:hover {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        input[type="file"] {
            display: none;
        }

        .upload-label {
            font-weight: 600;
            color: #e2e8f0;
            display: block;
            cursor: pointer;
        }

        .upload-hint {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 5px;
        }

        #status {
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            background: #0f172a;
            border: 1px solid #1e40af;
            color: #60a5fa;
        }

        /* 로딩 애니메이션 */
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🏋️ AI Pose Tracker Pro</h1>
            <p>유튜브 차단 걱정 없는 100% 확실한 로컬 영상 분석</p>
        </header>

        <div class="preview-window">
            <video id="mainVideo" playsinline controls></video>
            <canvas id="poseCanvas"></canvas>
        </div>

        <div class="controls">
            <div id="status">⏳ 모듈 초기화 중...</div>

            <label class="file-upload" id="dropZone">
                <input type="file" id="videoInput" accept="video/*">
                <span class="upload-label">📁 분석할 영상 파일 선택 (또는 드래그)</span>
                <span class="upload-hint">MP4, MOV, WebM 등 모든 영상 지원</span>
            </label>

            <p style="font-size: 11px; color: #64748b; text-align: center;">
                💡 팁: 유튜브 영상을 다운로드한 뒤 선택하면 가장 정확하게 분석됩니다.
            </p>
        </div>
    </div>

    <script type="module">
        // [LOG: 20260327_1302] Final Reliable Local Analysis Engine
        let poseLandmarker = null;
        let poseConnections = null;
        let animFrameId = null;

        const mainVideo = document.getElementById("mainVideo");
        const poseCanvas = document.getElementById("poseCanvas");
        const videoInput = document.getElementById("videoInput");
        const statusEl = document.getElementById("status");
        const ctx = poseCanvas.getContext("2d");

        // 1. 파일 선택 처리
        videoInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // 로컬 파일 URL 생성 (서버 업로드 없음)
            const url = URL.createObjectURL(file);
            mainVideo.src = url;
            mainVideo.load();

            statusEl.innerHTML = '<span class="spinner"></span> 영상 로딩 중...';

            mainVideo.onloadeddata = () => {
                statusEl.textContent = "🦴 실시간 포즈 감지 작동 중";
                statusEl.style.borderColor = "#059669";
                statusEl.style.color = "#34d399";

                // 캔버스 크기 맞춤
                poseCanvas.width = mainVideo.videoWidth;
                poseCanvas.height = mainVideo.videoHeight;

                if (animFrameId) cancelAnimationFrame(animFrameId);
                startLoop();
            };
        });

        // 2. 인공지능 초기화
        async function initAI() {
            try {
                const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0");
                const resolver = await vision.FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                poseLandmarker = await vision.PoseLandmarker.createFromOptions(resolver, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO", numPoses: 1
                });
                poseConnections = vision.PoseLandmarker.POSE_CONNECTIONS;

                statusEl.textContent = "✅ 준비 완료! 영상을 선택해 주세요.";
                console.log("MediaPipe initialized");
            } catch (e) {
                statusEl.textContent = "❌ AI 로드 실패";
                console.error(e);
            }
        }

        // 3. 실시간 분석 루프
        function startLoop() {
            function loop() {
                if (mainVideo.readyState >= 2 && !mainVideo.paused && poseLandmarker) {
                    try {
                        const result = poseLandmarker.detectForVideo(mainVideo, performance.now());
                        ctx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);

                        if (result.landmarks && result.landmarks[0]) {
                            drawPose(result.landmarks[0]);
                        } else {
                            // 감지 중임을 알리는 작은 표시
                            ctx.fillStyle = "rgba(239, 68, 68, 0.5)";
                            ctx.font = "12px sans-serif";
                            ctx.fillText("🔍 인물 검색 중...", 10, 20);
                        }
                    } catch (err) {
                        console.error("Detection error:", err);
                    }
                }
                animFrameId = requestAnimationFrame(loop);
            }
            animFrameId = requestAnimationFrame(loop);
        }

        function drawPose(landmarks) {
            ctx.save();
            ctx.strokeStyle = "#4ade80";
            ctx.lineWidth = 4;

            // 선 그리기 (임계값 0.5로 완화)
            poseConnections.forEach(c => {
                const s = landmarks[c.start], e = landmarks[c.end];
                if ((s.visibility > 0.5) && (e.visibility > 0.5)) {
                    ctx.beginPath();
                    ctx.moveTo(s.x * poseCanvas.width, s.y * poseCanvas.height);
                    ctx.lineTo(e.x * poseCanvas.width, e.y * poseCanvas.height);
                    ctx.stroke();
                }
            });

            // 점 그리기 (임계값 0.5로 완화)
            landmarks.forEach((p, idx) => {
                if (p.visibility > 0.5) {
                    ctx.beginPath();
                    ctx.arc(p.x * poseCanvas.width, p.y * poseCanvas.height, 5, 0, 2 * Math.PI);
                    ctx.fillStyle = idx % 2 === 0 ? "#ef4444" : "#fff";
                    ctx.fill();
                }
            });

            // 분석 중 텍스트 표시
            ctx.fillStyle = "#4ade80";
            ctx.font = "bold 14px sans-serif";
            ctx.fillText("✅ 분석 중", 10, 25);
            ctx.restore();
        }

        initAI();
    </script>
</body>

</html>
