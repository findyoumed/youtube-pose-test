<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Pose Detection (Smart Capture)</title>
    <style>
        /* [LOG: 20260327_1224] Smart Screen Capture UI 개편 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 700;
            color: #FF0000;
        }

        /* 메인 컨테이너 */
        .main-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 900px;
            gap: 20px;
        }

        /* 비디오 영역 */
        .video-wrapper {
            position: relative;
            width: 640px;
            height: 360px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
        }

        #player {
            width: 100%;
            height: 100%;
        }

        #poseCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 상태 및 설정 패널 */
        .panel {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            border: 1px solid #333;
        }

        #status {
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .status-ready {
            background: #16a34a33;
            color: #4ade80;
            border: 1px solid #16a34a66;
        }

        .status-busy {
            background: #2563eb33;
            color: #60a5fa;
            border: 1px solid #2563eb66;
        }

        .status-err {
            background: #dc262633;
            color: #f87171;
            border: 1px solid #dc262666;
        }

        /* 입력 그룹 */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0b0b0b;
            color: #fff;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: #FF0000;
        }

        /* 버튼 */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .btn-primary {
            background: #FF0000;
            color: white;
        }

        .btn-primary:hover {
            background: #CC0000;
            transform: translateY(-1px);
        }

        .btn-action {
            background: #2563eb;
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn-action:hover {
            background: #1d4ed8;
        }

        .btn-action.active {
            background: #dc2626;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 도움말 */
        .guide {
            font-size: 13px;
            color: #888;
            line-height: 1.6;
            margin-top: 15px;
            padding: 15px;
            background: #0b0b0b;
            border-radius: 8px;
            border-left: 4px solid #facc15;
        }

        .guide b {
            color: #fff;
        }

        /* 로그 */
        #log {
            width: 100%;
            height: 120px;
            background: #000;
            color: #00ff00;
            padding: 10px;
            border-radius: 8px;
            font-family: 'Fira Code', monospace;
            font-size: 11px;
            overflow-y: auto;
            opacity: 0.7;
            margin-top: 20px;
            border: 1px solid #222;
        }

        /* 숨겨진 도움체 */
        #cropCanvas {
            display: none;
        }
    </style>
</head>

<body>
    <div class="main-layout">
        <h1>🏋️ YouTube Smart AI Pose Detection</h1>

        <div class="video-wrapper">
            <div id="player"></div>
            <canvas id="poseCanvas"></canvas>
        </div>

        <div class="panel">
            <div id="status" class="status-ready">⏳ MediaPipe 준비 중...</div>

            <div class="input-group">
                <input type="text" id="videoIdInput" placeholder="YouTube Video ID 입력 (예: 8a9M0lNY37s)"
                    value="8a9M0lNY37s">
                <button class="btn btn-primary" onclick="handleLoadVideo()">영상 로드</button>
            </div>

            <button id="btnCapture" class="btn btn-action" onclick="toggleAnalysis()" disabled>
                🚀 스마트 분석 시작 (캡처 모드)
            </button>

            <div class="guide">
                <b>💡 사용법 (로그인/쿠키 불필요):</b><br>
                1. 보고 싶은 유튜브 영상을 로드합니다.<br>
                2. <b>분석 시작</b> 버튼을 누르면 브라우저 팝업이 뜹니다.<br>
                3. 상단 탭 목록에서 <b>[현재 탭 (이 페이지)]</b>을 선택하고 공유를 누르세요.<br>
                4. 자동으로 유튜브 화면만 인식하여 포즈 분석이 시작됩니다! ✨
            </div>
        </div>

        <div id="log"></div>
    </div>

    <!-- 분석을 위한 숨김 캔버스 (크롭용) -->
    <canvas id="cropCanvas"></canvas>

    <script type="module">
        // [LOG: 20260327_1224] Smart Screen Capture Engine (Region Crop)

        let VIDEO_ID = "8a9M0lNY37s";
        let ytPlayer = null;
        let poseLandmarker = null;
        let poseConnections = null;
        let analysisActive = false;
        let captureStream = null;
        let animFrameId = null;

        const playerDiv = document.getElementById("player");
        const poseCanvas = document.getElementById("poseCanvas");
        const cropCanvas = document.getElementById("cropCanvas");
        const statusEl = document.getElementById("status");
        const logEl = document.getElementById("log");
        const btnCapture = document.getElementById("btnCapture");

        const canvasCtx = poseCanvas.getContext("2d");
        const cropCtx = cropCanvas.getContext("2d");

        // ===== 로그 & 상태 =====
        function log(msg) {
            const time = new Date().toLocaleTimeString();
            logEl.textContent = `[${time}] ${msg}\n` + logEl.textContent;
            console.log(msg);
        }

        function setStatus(text, type) {
            statusEl.textContent = text;
            statusEl.className = `status-${type}`;
        }

        // ===== 유튜브 로드 =====
        window.handleLoadVideo = () => {
            const id = document.getElementById("videoIdInput").value.trim();
            if (id.length !== 11) return alert("올바른 유튜브 ID를 입력하세요.");
            VIDEO_ID = id;
            if (ytPlayer && ytPlayer.loadVideoById) {
                ytPlayer.loadVideoById(VIDEO_ID);
                log(`📺 영상 변경: ${VIDEO_ID}`);
            }
        };

        // ===== 스마트 분석 토글 (핵심) =====
        window.toggleAnalysis = async () => {
            if (analysisActive) {
                stopAnalysis();
            } else {
                await startAnalysis();
            }
        };

        async function startAnalysis() {
            log("🚀 분석 엔진 가동 중...");
            try {
                // 1. 화면 공유 스트림 획득 (현재 탭)
                captureStream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        displaySurface: "browser",
                        cursor: "never"
                    },
                    audio: false
                });

                // 스트림 종료 핸들러 (사용자가 상단 '공유 중지' 누를 때)
                captureStream.getVideoTracks()[0].onended = () => stopAnalysis();

                analysisActive = true;
                btnCapture.textContent = "⏹️ 분석 중지";
                btnCapture.classList.add("active");
                setStatus("📡 실시간 화면 분석 중...", "busy");
                log("✅ 화면 캡처 스트림 획득 (현재 탭 선택됨)");

                startLoop();
            } catch (err) {
                log(`❌ 캡처 실패: ${err.message}`);
                stopAnalysis();
            }
        }

        function stopAnalysis() {
            analysisActive = false;
            if (animFrameId) cancelAnimationFrame(animFrameId);
            if (captureStream) {
                captureStream.getTracks().forEach(t => t.stop());
                captureStream = null;
            }
            btnCapture.textContent = "🚀 스마트 분석 시작 (캡처 모드)";
            btnCapture.classList.remove("active");
            setStatus("✅ 준비 완료! 영상을 분석하려면 버튼을 누르세요.", "ready");
            canvasCtx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);
            log("⏹️ 분석 중지됨");
        }

        // ===== 분석 루프 (Smart Crop) =====
        function startLoop() {
            const videoTrack = captureStream.getVideoTracks()[0];
            const captureVideo = document.createElement("video");
            captureVideo.srcObject = captureStream;
            captureVideo.play();

            function loop() {
                if (!analysisActive) return;

                // 1. 유튜브 플레이어의 현재 위치/크기 계산
                const rect = playerDiv.getBoundingClientRect();

                // 브라우저 줌(Zoom) 대응 (장치 픽셀 비)
                const dpr = window.devicePixelRatio || 1;

                // 캡처 스트림의 실제 해상도와 브라우저 뷰포트 크기 비율 계산
                // 탭 캡처는 보통 뷰포트 영역만 가져옵니다.
                const streamWidth = captureVideo.videoWidth;
                const streamHeight = captureVideo.videoHeight;
                const viewportWidth = window.innerWidth;
                const viewportHeight = window.innerHeight;

                const scaleX = streamWidth / viewportWidth;
                const scaleY = streamHeight / viewportHeight;

                // 캡처 스트림에서 잘라낼 영역 (유튜브 플레이어 좌표)
                const sx = rect.left * scaleX;
                const sy = rect.top * scaleY;
                const sw = rect.width * scaleX;
                const sh = rect.height * scaleY;

                if (sw > 0 && sh > 0 && poseLandmarker) {
                    // 2. 크롭용 캔버스 크기 조정
                    cropCanvas.width = 640;
                    cropCanvas.height = 360;

                    // 3. 캡처 비디오에서 플레이어 영역만 크롭해서 그리기
                    cropCtx.drawImage(captureVideo, sx, sy, sw, sh, 0, 0, 640, 360);

                    // 4. MediaPipe 분석 (640x360 캔버스 사용)
                    const result = poseLandmarker.detectForVideo(cropCanvas, performance.now());

                    // 5. 그리기
                    poseCanvas.width = playerDiv.clientWidth;
                    poseCanvas.height = playerDiv.clientHeight;
                    canvasCtx.clearRect(0, 0, poseCanvas.width, poseCanvas.height);

                    if (result.landmarks && result.landmarks[0]) {
                        drawPose(result.landmarks[0]);
                    }
                }

                animFrameId = requestAnimationFrame(loop);
            }
            animFrameId = requestAnimationFrame(loop);
        }

        // ===== 포즈 그리기 =====
        function drawPose(landmarks) {
            canvasCtx.save();
            canvasCtx.strokeStyle = "rgba(0, 255, 0, 0.9)";
            canvasCtx.lineWidth = 4;
            canvasCtx.lineJoin = "round";

            // 연결선
            poseConnections.forEach(c => {
                const s = landmarks[c.start], e = landmarks[c.end];
                if (s.visibility > 0.6 && e.visibility > 0.6) {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(s.x * poseCanvas.width, s.y * poseCanvas.height);
                    canvasCtx.lineTo(e.x * poseCanvas.width, e.y * poseCanvas.height);
                    canvasCtx.stroke();
                }
            });

            // 핵심 관절 포인트
            landmarks.forEach((p, idx) => {
                if (p.visibility > 0.6) {
                    canvasCtx.beginPath();
                    canvasCtx.arc(p.x * poseCanvas.width, p.y * poseCanvas.height, 5, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = idx % 2 === 0 ? "#FF0000" : "#FFFFFF";
                    canvasCtx.fill();
                    canvasCtx.strokeStyle = "#000";
                    canvasCtx.lineWidth = 1;
                    canvasCtx.stroke();
                }
            });
            canvasCtx.restore();
        }

        // ===== 초기화 =====
        async function init() {
            log("🤖 인공지능 모듈 로드 중...");
            try {
                const vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0");
                const FilesetResolver = vision.FilesetResolver;
                const PoseLandmarker = vision.PoseLandmarker;

                const resolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
                poseLandmarker = await PoseLandmarker.createFromOptions(resolver, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO", numPoses: 1
                });
                poseConnections = PoseLandmarker.POSE_CONNECTIONS;

                window.onYouTubeIframeAPIReady = () => {
                    ytPlayer = new YT.Player("player", {
                        height: "100%", width: "100%", videoId: VIDEO_ID,
                        playerVars: { playsinline: 1, rel: 0, enablejsapi: 1, controls: 1 },
                        events: {
                            onReady: () => {
                                log("✅ 유튜브 플레이어 준비 완료");
                                setStatus("✅ 준비 완료! 영상을 분석하려면 버튼을 누르세요.", "ready");
                                btnCapture.disabled = false;
                            }
                        }
                    });
                };

                const tag = document.createElement("script");
                tag.src = "https://www.youtube.com/iframe_api";
                document.body.appendChild(tag);

                log("✅ MediaPipe 로드 성공");
            } catch (e) {
                log(`❌ 초기화 실패: ${e.message}`);
                setStatus("❌ AI 로드 실패", "err");
            }
        }

        init();
    </script>
</body>

</html>
